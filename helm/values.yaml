atlantis:
  githubApp:
    id: "2654766"
    slug: bymv-atlantis
  orgAllowlist: "github.com/MoralesV93/bymv-frontend-pbrand"
  vcsSecretName: atlantis-vcs
  extraPath: "/atlantis-data/bin"
  extraVolumeMounts:
    - name: tf-vars-volume
      mountPath: /atlantis-data/tfvars
      readOnly: true
  extraVolumes:
    - name: tf-vars-volume
      secret:
        secretName: atlantis-tf-vars
  awsSecretName: atlantis-aws-cred
  environment:
    ATLANTIS_DEFAULT_TF_VERSION:  1.8.5
    TF_VAR_FILE: /atlantis-data/tfvars/terraform.tfvars
  # Server-side repo config with workflow hooks
  # Docs: https://www.runatlantis.io/docs/server-side-repo-config.html
  repoConfig: |
    ---
    repos:
    - id: github.com/MoralesV93/bymv-frontend-pbrand
      apply_requirements: [approved, mergeable, undiverged]
      allowed_overrides: [apply_requirements,workflow]
      allow_custom_workflows: true

      pre_workflow_hooks:
        - run: "echo [AUDIT] PR=$PULL_NUM by $PULL_AUTHOR commit=$HEAD_COMMIT"
        - run: "test $HEAD_BRANCH_NAME != main || { echo ERROR: Direct changes from main not allowed; exit 1; }"

      post_workflow_hooks:
        - run: "echo [DONE] PR=$PULL_NUM completed"